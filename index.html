<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>AR 名刺 - 3DGS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #ar-container { width: 100%; height: 100%; position: relative; }

    /* ローディング画面 */
    #loading-screen {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 9999; color: white; gap: 20px;
    }
    #loading-screen .logo { font-size: 48px; }
    #loading-screen h1 { font-size: 22px; font-weight: 600; }
    #loading-screen p { font-size: 14px; color: #aaa; text-align: center; max-width: 280px; line-height: 1.6; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* スキャン案内 */
    #scan-hint {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white; padding: 14px 24px;
      border-radius: 30px; font-size: 15px;
      text-align: center; z-index: 100;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: none;
      transition: opacity 0.5s ease;
      white-space: nowrap;
    }
    #scan-hint.hidden { opacity: 0; }

    /* フラッシュ演出 */
    #found-flash {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.3);
      z-index: 50; pointer-events: none;
      opacity: 0; transition: opacity 0.15s ease;
    }
    #found-flash.flash { opacity: 1; }

    /* エラー画面 */
    #error-screen {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 9999; color: white; gap: 16px;
      padding: 32px; text-align: center;
    }
    #error-screen h2 { font-size: 20px; color: #ff6b6b; }
    #error-screen p { font-size: 14px; color: #ccc; line-height: 1.6; white-space: pre-line; }
    #error-screen button {
      margin-top: 8px; padding: 12px 28px;
      background: white; color: black;
      border: none; border-radius: 24px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="logo">✨</div>
    <h1>AR 名刺</h1>
    <div class="spinner"></div>
    <p>カメラと3Dデータを<br>読み込んでいます…</p>
  </div>

  <div id="error-screen">
    <h2>⚠️ エラーが発生しました</h2>
    <p id="error-message">カメラへのアクセスが拒否されました。</p>
    <button onclick="location.reload()">再試行</button>
  </div>

  <div id="found-flash"></div>
  <div id="scan-hint">📇 名刺のQRコードにカメラを向けてください</div>
  <div id="ar-container"></div>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

  <!-- MindAR.js (Three.js版) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <!-- TWEEN.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18.6.4/src/Tween.js"></script>

  <!-- gaussian-splats-3d (UMD版) -->
  <script src="https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.5/build/gaussian-splats-3d.umd.js"></script>

  <script>
    // =====================================================
    // 設定
    // =====================================================
    var CONFIG = {
      splatPath:      "./ryo_ss60_edit.splat",
      mindFilePath:   "./targets.mind",
      targetScale:    0.15,
      positionOffset: { x: 0, y: 0.05, z: 0 },
      animDuration:   800
    };

    // =====================================================
    // ユーティリティ
    // =====================================================
    function showError(msg) {
      document.getElementById("loading-screen").style.display = "none";
      var s = document.getElementById("error-screen");
      s.style.display = "flex";
      document.getElementById("error-message").textContent = msg;
    }

    function hideLoading() {
      var el = document.getElementById("loading-screen");
      el.style.transition = "opacity 0.5s ease";
      el.style.opacity = "0";
      setTimeout(function(){ el.style.display = "none"; }, 500);
    }

    function flashScreen() {
      var f = document.getElementById("found-flash");
      f.classList.add("flash");
      setTimeout(function(){ f.classList.remove("flash"); }, 200);
    }

    // =====================================================
    // ニョキッとアニメーション
    // =====================================================
    function animateAppear(mesh) {
      if (!mesh) return;
      var from = { s: 0 };
      new TWEEN.Tween(from)
        .to({ s: CONFIG.targetScale }, CONFIG.animDuration)
        .easing(TWEEN.Easing.Back.Out)
        .onUpdate(function() {
          mesh.scale.set(from.s, from.s, from.s);
        })
        .start();
    }

    function animateDisappear(mesh) {
      if (!mesh) return;
      var cur = mesh.scale.x;
      var from = { s: cur };
      new TWEEN.Tween(from)
        .to({ s: 0 }, 300)
        .easing(TWEEN.Easing.Quadratic.In)
        .onUpdate(function() {
          mesh.scale.set(from.s, from.s, from.s);
        })
        .start();
    }

    // =====================================================
    // メイン初期化
    // =====================================================
    async function init() {
      try {
        // MindAR が読み込まれているか確認
        if (typeof window.MINDAR === "undefined" || typeof window.MINDAR.IMAGE === "undefined") {
          throw new Error("MindAR.jsの読み込みに失敗しました。ページを再読み込みしてください。");
        }

        // MindAR 初期化
        var mindarThree = new window.MINDAR.IMAGE.MindARThree({
          container:        document.getElementById("ar-container"),
          imageTargetSrc:   CONFIG.mindFilePath,
          maxTrack:         1,
          uiLoading:        "no",
          uiScanning:       "no",
          uiError:          "no"
        });

        var renderer = mindarThree.renderer;
        var scene    = mindarThree.scene;
        var camera   = mindarThree.camera;

        // ライティング
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        var dir = new THREE.DirectionalLight(0xffffff, 0.5);
        dir.position.set(1, 2, 1);
        scene.add(dir);

        // アンカー
        var anchor = mindarThree.addAnchor(0);
        var anchorGroup = anchor.group;

        // 3DGS または フォールバックオブジェクト
        var displayMesh = null;
        var splatViewer = null;

        // gaussian-splats-3d が読み込まれているか確認
        if (typeof GaussianSplats3D !== "undefined") {
          try {
            splatViewer = new GaussianSplats3D.Viewer({
              threeScene:            scene,
              selfDrivenMode:        false,
              useBuiltInControls:    false,
              ignoreDevicePixelRatio: false,
              gpuAcceleratedSort:    true,
              sharedMemoryForWorkers: false
            });

            await splatViewer.loadFile(CONFIG.splatPath, {
              splatAlphaRemovalThreshold: 5,
              halfPrecisionCovariancesOnGPU: true
            });

            displayMesh = splatViewer.splatMesh;
            console.log("✅ 3DGS読み込み成功");
          } catch (e) {
            console.warn("3DGS読み込み失敗、フォールバックを使用:", e);
            splatViewer = null;
          }
        }

        // フォールバック: 3DGSが使えない場合は球体を表示
        if (!displayMesh) {
          console.log("ℹ️ フォールバックオブジェクトを使用");
          var geo = new THREE.SphereGeometry(0.08, 32, 32);
          var mat = new THREE.MeshStandardMaterial({
            color: 0x4488ff, metalness: 0.3, roughness: 0.4
          });
          displayMesh = new THREE.Mesh(geo, mat);
        }

        displayMesh.scale.set(0, 0, 0);
        displayMesh.position.set(
          CONFIG.positionOffset.x,
          CONFIG.positionOffset.y,
          CONFIG.positionOffset.z
        );
        anchorGroup.add(displayMesh);

        // マーカー認識イベント
        anchor.onTargetFound = function() {
          console.log("✅ マーカー認識");
          flashScreen();
          animateAppear(displayMesh);
          document.getElementById("scan-hint").classList.add("hidden");
        };

        anchor.onTargetLost = function() {
          console.log("❌ マーカー消失");
          animateDisappear(displayMesh);
          setTimeout(function() {
            document.getElementById("scan-hint").classList.remove("hidden");
          }, 1000);
        };

        // MindAR 開始
        await mindarThree.start();
        hideLoading();

        // レンダーループ
        renderer.setAnimationLoop(function(time) {
          TWEEN.update(time);
          if (splatViewer) {
            try { splatViewer.update(); } catch(e) {}
          }
          renderer.render(scene, camera);
        });

      } catch (err) {
        console.error("AR初期化エラー:", err);
        var msg = err.message || String(err);
        if (err.name === "NotAllowedError" || msg.includes("camera") || msg.includes("Permission")) {
          showError("カメラへのアクセスが拒否されました。\nブラウザの設定からカメラを許可してください。");
        } else if (msg.includes("targets.mind") || msg.includes("404")) {
          showError("マーカーファイルが見つかりません。\ntargets.mind が正しく配置されているか確認してください。");
        } else {
          showError(msg);
        }
      }
    }

    // ライブラリ読み込み完了後に初期化
    window.addEventListener("load", function() {
      // 少し待ってからMindARの存在を確認
      setTimeout(init, 100);
    });
  </script>
</body>
</html>
